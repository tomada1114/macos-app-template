name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

jobs:
  test:
    name: Test before release
    runs-on: macos-26
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # No caching in the release path (zizmor: cache-poisoning hardening).
          cache: false

      - name: Run tests with coverage floor
        run: scripts/coverage.sh

      - name: Build app (Debug)
        run: just build

  release:
    name: Build, Sign & Release DMG
    needs: [test]
    runs-on: macos-26
    timeout-minutes: 45
    permissions:
      contents: write
      attestations: write
      id-token: write
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app
      APP_NAME: MyApp
      # Secret-gated signing/notarization: steps check these flags because the
      # secrets context is not available in step-level `if:` expressions.
      HAS_DEVELOPER_ID: ${{ secrets.DEVELOPER_ID_CERT_P12 != '' }}
      HAS_NOTARIZATION: ${{ secrets.APPLE_ID != '' && secrets.APPLE_TEAM_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          # No caching in the release path (zizmor: cache-poisoning hardening).
          cache: false

      - name: Validate tag matches MARKETING_VERSION
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION=$(grep -E '^[[:space:]]*MARKETING_VERSION:' project.yml | awk '{print $2}' | tr -d '"')
          if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match MARKETING_VERSION '$VERSION' (expected 'v$VERSION')."
            exit 1
          fi
          echo "Tag $GITHUB_REF_NAME matches MARKETING_VERSION $VERSION."

      - name: Build app (Release)
        run: |
          xcodegen generate
          set -o pipefail
          xcodebuild -project "$APP_NAME.xcodeproj" -scheme "$APP_NAME" \
            -configuration Release -derivedDataPath build build | xcbeautify --quiet

      - name: Sign with Developer ID
        if: ${{ env.HAS_DEVELOPER_ID == 'true' }}
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/release.keychain-db"
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          printf '%s' "$CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S "apple-tool:,apple:" -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No 'Developer ID Application' identity found in the imported certificate."
            exit 1
          fi
          codesign --force --options runtime --timestamp \
            --entitlements "App/$APP_NAME.entitlements" \
            --sign "$IDENTITY" "build/Build/Products/Release/$APP_NAME.app"
          codesign --verify --verbose=2 "build/Build/Products/Release/$APP_NAME.app"

      - name: Ad-hoc sign (Developer ID secrets not configured)
        if: ${{ env.HAS_DEVELOPER_ID != 'true' }}
        run: |
          echo "::notice::DEVELOPER_ID_CERT_P12 is not set — ad-hoc signing only. Downloads will be blocked by Gatekeeper; see docs/distribution.md."
          codesign --force --deep --sign - "build/Build/Products/Release/$APP_NAME.app"
          codesign --verify --verbose=2 "build/Build/Products/Release/$APP_NAME.app"

      - name: Package DMG
        run: scripts/package_dmg.sh "build/Build/Products/Release/$APP_NAME.app" "$APP_NAME.dmg"

      - name: Notarize and staple
        if: ${{ env.HAS_NOTARIZATION == 'true' }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          xcrun notarytool submit "$APP_NAME.dmg" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "$APP_NAME.dmg"

      - name: Notarization skipped notice
        if: ${{ env.HAS_NOTARIZATION != 'true' }}
        run: |
          echo "::notice::Notarization secrets (APPLE_ID / APPLE_TEAM_ID / APPLE_APP_SPECIFIC_PASSWORD) are not fully set — skipping notarization. See docs/distribution.md."

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: MyApp.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release create "$TAG" --generate-notes "$APP_NAME.dmg"
