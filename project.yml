# XcodeGen manifest — the SOURCE OF TRUTH for the app target.
# MyApp.xcodeproj is generated (`just generate`) and gitignored; never hand-edit it.
name: MyApp
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
packages:
  MyAppKit:
    path: Packages/MyAppKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  MyApp:
    type: application
    platform: macOS
    sources: [App]
    dependencies:
      - package: MyAppKit
        product: MyAppUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.MyApp
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: App/MyApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
schemes:
  MyApp:
    build:
      targets: { MyApp: all }
